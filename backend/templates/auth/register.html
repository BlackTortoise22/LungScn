{% extends "layouts/public_base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-body">
                    <h1 class="h3 mb-3">Request Access</h1>
                    <p class="text-muted">
                        New clinical users should be created by an administrator so role and audit settings stay consistent.
                    </p>
                    <a class="btn btn-primary" href="{{ url_for('auth.login') }}">Back to sign in</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
