{% macro input(name,label,type="text",placeholder="",value="",required=False) %}

<div class="mb-3">

<label class="form-label">

{{ label }}

</label>

<input

type="{{ type }}"

name="{{ name }}"

value="{{ value }}"

placeholder="{{ placeholder }}"

class="form-control"

{% if required %}required{% endif %}

>

</div>

{% endmacro %}


{% macro select(name,label,options=[]) %}

<div class="mb-3">

<label class="form-label">

{{ label }}

</label>

<select
name="{{ name }}"
class="form-select">

{% for option in options %}

<option>

{{ option }}

</option>

{% endfor %}

</select>

</div>

{% endmacro %}
