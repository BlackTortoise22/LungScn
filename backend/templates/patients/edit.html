{% extends "layouts/dashboard_base.html" %}

{% block title %}Edit Patient{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/patients.css') }}">
{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2 class="page-title mb-1">
            Edit Patient
        </h2>

        <p class="text-muted mb-0">
            Update patient demographics, contact information, and symptom notes.
        </p>

    </div>

    <a
        href="{{ url_for('patient.patient_details', patient_id=patient.patient_id) }}"
        class="btn btn-outline-secondary">

        <i class="bi bi-arrow-left me-2"></i>
        Back to Details

    </a>

</div>


<div class="card shadow-sm">

    <div class="card-body">

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Patient Code
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        value="{{ patient.patient_code }}"
                        readonly>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        value="{{ patient.full_name }}"
                        required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Age
                    </label>

                    <input
                        type="number"
                        name="age"
                        class="form-control"
                        value="{{ patient.age }}"
                        min="1"
                        max="120"
                        required>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Gender
                    </label>

                    <select
                        name="gender"
                        class="form-select"
                        required>

                        <option value="Male"
                            {% if patient.gender=="Male" %}selected{% endif %}>
                            Male
                        </option>

                        <option value="Female"
                            {% if patient.gender=="Female" %}selected{% endif %}>
                            Female
                        </option>

                        <option value="Other"
                            {% if patient.gender=="Other" %}selected{% endif %}>
                            Other
                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Phone Number
                    </label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ patient.phone }}"
                        required>

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ patient.email }}">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Address
                </label>

                <textarea
                    class="form-control"
                    rows="3"
                    name="address">{{ patient.address }}</textarea>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Symptoms
                </label>

                <textarea
                    class="form-control"
                    rows="4"
                    name="symptoms">{{ patient.symptoms }}</textarea>

            </div>

            <div class="d-flex justify-content-end">

                <a
                    href="{{ url_for('patient.patient_home') }}"
                    class="btn btn-outline-secondary me-2">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="btn btn-primary">

                    <i class="bi bi-check-circle me-2"></i>

                    Update Patient

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
