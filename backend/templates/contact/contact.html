{% extends "layouts/public_base.html" %}

{% block title %}Contact{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="fw-bold mb-3">Contact the LungScan team</h1>
            <p class="text-muted mb-4">
                Use this page as the public contact surface for deployment details, clinical review questions, or admin support.
            </p>
            <div class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input class="form-control" placeholder="Your name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="4" placeholder="How can we help?"></textarea>
                    </div>
                    <button class="btn btn-primary" type="button">Send message</button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
